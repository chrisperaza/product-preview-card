<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Preview Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body id="body">
    <main id="main">
      <picture id="picture">
        <source
          media="(max-width: 650px)"
          srcset="./assets/image-product-mobile.jpg"
        />
        <source
          media="(max-width: 992px)"
          srcset="./assets/image-product-desktop.jpg"
        />
        <img
          src="./assets/image-product-desktop.jpg"
          alt="Square Chanel perfume bottle on a white background with a plant branch next to it."
        />
      </picture>
      <section id="main_section">
        <header id="main_section-header">
          <p>Perfume</p>
          <h1>Gabrielle Essence Eau De Parfum</h1>
        </header>
        <p id="main_section-paragraph">
          A floral, solar and voluptuous interpretation composed by Olivier
          Polge, Perfumer-Creator for the House of CHANEL.
        </p>
        <div id="money_container">
          <data id="money_big" value="149.99">&dollar;149.99</data
          ><data id="money_small" value="149.99">&dollar;149.99</data>
        </div>
        <button id="button" title="Add to Cart button">
          <img
            src="./assets/icon-cart.svg"
            alt="Simple white icon of a shopping cart"
          />
          Add to Cart
        </button>
      </section>
    </main>
    <footer id="footer">
      <p id="footer_content">
        &copy; 2026 Coded by
        <a
          href="https://github.com/chrisperaza/"
          target="_blank"
          rel="noopener noreferrer"
          >chrisperaza</a
        >. Challenge by
        <a
          href="https://www.frontendmentor.io/challenges/product-preview-card-component-GO7UmttRfa"
          target="_blank"
          rel="noopener noreferrer"
          >Frontend Mentor</a
        >.
      </p>
    </footer>
  </body>
</html>
